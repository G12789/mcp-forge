  <text x="410" y="23" text-anchor="middle" fill="#8b949e" font-size="13">mcp-forge</text>

  <text x="24" y="72" fill="#8b949e">$</text>
  <text x="44" y="72" fill="#c9d1d9">npm create <tspan fill="#56d4dd">mcpforge@latest</tspan> <tspan fill="#e3b341">weather-server</tspan></text>

  <text x="24" y="108" fill="#7c3aed" font-weight="bold">mcp-forge</text>
  <text x="120" y="108" fill="#8b949e">¯  forge a working MCP server in 30s</text>

  <text x="24" y="140" fill="#56d4dd">?</text>
